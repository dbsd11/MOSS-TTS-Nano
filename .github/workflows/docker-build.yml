name: Docker Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Aliyun ACR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: registry.cn-chengdu.aliyuncs.com
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: docker build -t moss-tts-nano:local .
        timeout-minutes: 60

      - name: Verify image
        run: |
          docker images moss-tts-nano:local
          docker run -d --name test -p 18083:18083 -v /tmp/models:/app/models moss-tts-nano:local
          for i in $(seq 1 60); do
            curl -sf http://localhost:18083/health && break
            sleep 2
          done
          docker logs test
          docker stop test && docker rm test

      - name: Tag and push to Aliyun ACR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          IMAGE=registry.cn-hangzhou.aliyuncs.com/dbsnolimit/moss-tts-nano:latest
          docker tag moss-tts-nano:local $IMAGE
          docker push $IMAGE
